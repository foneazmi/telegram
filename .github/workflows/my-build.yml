name: Build

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "!.github/workflows/build.yml"
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties

      - name: Configure Signing
        run: |
          echo "storeFile=${{ github.workspace }}/keystore.jks" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

          echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > keystore.jks

      - name: Configure Secrets
        run: |
          echo "apiId=${{ secrets.API_ID }}" >> local.properties
          echo "apiHash=${{ secrets.API_HASH }}" >> local.properties
          # echo "helperBotId=${{ secrets.HELPER_BOT_ID }}" >> local.properties
          # echo "helperBotUsername=${{ secrets.HELPER_BOT_USERNAME }}" >> local.properties
          # echo "mapsApiKey=${{ secrets.MAPS_API_KEY }}" >> local.properties

          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json

      - name: Build with Gradle
        run: |
          ./gradlew assembleRelease

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: "${{ github.workspace }}/TMessagesProj_App/build/outputs"

      - name: Upload arm64-v8a build apk
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-arm64-v8a.apk

      - name: Upload APK to VPS
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY_ED25519 }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          APK_PATH=$(find TMessagesProj_App/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found in TMessagesProj_App/build/outputs/apk/release/"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"
          BUILD_NO="${{ github.run_number }}"
          DATE=$(date +%Y%m%d)
          COMMIT_SHA=$(git rev-parse --short=7 HEAD)
          RENAMED_APK="telegram-${BUILD_NO}-${DATE}-${COMMIT_SHA}.apk"
          cp "$APK_PATH" "$RENAMED_APK"
          echo "Renamed to: $RENAMED_APK"
          ls -lh "$RENAMED_APK"
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.PORT }} -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p file/guest/"
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -P ${{ secrets.PORT }} "$RENAMED_APK" ${{ secrets.USERNAME }}@${{ secrets.HOST }}:file/guest/
